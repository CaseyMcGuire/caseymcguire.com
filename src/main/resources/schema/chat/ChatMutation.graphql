extend type Mutation {
  sendMessage(
    conversationId: ID, # null if this is a new chat
    message: String!
  ): ChatResponse!
}

union ChatResponse = SuccessfulChatResponse | FailedChatResponse

type SuccessfulChatResponse {
  conversationId: ID!
  userMessageEdge: AiMessageEdge!
  assistantMessageEdge: AiMessageEdge!
}

type FailedChatResponse {
  errorCode: ChatErrorCode!
  userFacingErrorMessage: String!
}

enum ChatErrorCode {
  CONVERSATION_NOT_FOUND
  NOT_LOGGED_IN
  UNKNOWN
}
