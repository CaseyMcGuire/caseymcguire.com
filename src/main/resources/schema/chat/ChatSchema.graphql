
extend type Query {
  aiConversations(
    first: Int
    after: String
    last: Int
    before: String
  ): AiConversationConnection
  aiConversation(
    id: ID!
  ): AiConversation
}

type AiConversationConnection {
  pageInfo: PageInfo!
  edges: [AiConversationEdge!]!
}

type AiConversationEdge {
  node: AiConversation!
  cursor: String!
}

type AiConversation {
  id: ID!
  title: String!
  messages(
    first: Int
    after: String
    last: Int
    before: String
  ): AiMessageConnection
}

type AiMessageConnection {
  pageInfo: PageInfo!
  edges: [AiMessageEdge!]!
}

type AiMessageEdge {
  node: AiMessage!
  cursor: String!
}

type AiMessage {
  id: ID!
  role: AiMessageRole!
  content: String!
  createdAt: String!
}

enum AiMessageRole {
  USER
  ASSISTANT
  SYSTEM
  TOOL
}